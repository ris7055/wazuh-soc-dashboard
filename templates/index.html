<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ai-SOC.MSP Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- ============ TOP NAV BAR (FortiSIEM-style) ============ -->
    <nav class="top-navbar">
        <div class="top-nav-brand">
            <i class="bi bi-shield-lock-fill me-2"></i>
            <span class="brand-text">Ai-SOC<span class="brand-accent">.MSP</span></span>
        </div>
        <div class="top-nav-links">
            <a href="#" class="top-nav-item active" data-page="dashboard">
                <i class="bi bi-speedometer2"></i> DASHBOARD
            </a>
            <a href="#" class="top-nav-item" data-page="incidents">
                <i class="bi bi-exclamation-triangle-fill"></i> INCIDENTS
            </a>
            <a href="#" class="top-nav-item" data-page="cases">
                <i class="bi bi-folder2-open"></i> CASES
            </a>
            <a href="#" class="top-nav-item" data-page="cmdb">
                <i class="bi bi-server"></i> CMDB
            </a>
            <a href="#" class="top-nav-item" data-page="icmp">
                <i class="bi bi-broadcast-pin"></i> ICMP DATA
            </a>
            <a href="#" class="top-nav-item" data-page="snmp">
                <i class="bi bi-diagram-3"></i> SNMP PERF
            </a>
            <a href="#" class="top-nav-item" data-page="ueba">
                <i class="bi bi-person-bounding-box"></i> UEBA
            </a>
        </div>
        <div class="top-nav-right">
            <span class="nav-clock" id="nav-clock"></span>
            <div class="dropdown">
                <button class="btn btn-sm btn-outline-light dropdown-toggle" type="button" data-bs-toggle="dropdown">
                    <i class="bi bi-person-circle me-1"></i>{{ user }}
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="#" onclick="showChangePasswordModal()">
                        <i class="bi bi-key me-2"></i>Change Password</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="/logout">
                        <i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ============ SUB NAV (context-sensitive) ============ -->
    <div class="sub-navbar" id="sub-navbar">
        <!-- Populated by JS based on active page -->
    </div>

    <!-- ============ MAIN CONTENT ============ -->
    <div class="main-content" id="main-content">
        <!-- Loading spinner -->
        <div class="text-center py-5" id="page-loader">
            <div class="spinner-border text-warning" role="status"></div>
            <p class="mt-3 text-muted">Loading dashboard...</p>
        </div>
    </div>

    <!-- ============ AGENT DETAIL MODAL ============ -->
    <div class="modal fade" id="agentDetailModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content bg-dark">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" id="agent-detail-title">Agent Details</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="agent-detail-body">
                    <div class="text-center py-4">
                        <div class="spinner-border text-warning"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ============ CHANGE PASSWORD MODAL ============ -->
    <div class="modal fade" id="changePasswordModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content bg-dark">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title"><i class="bi bi-key me-2"></i>Change Password</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Current Password</label>
                        <input type="password" class="form-control" id="cp-current">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">New Password</label>
                        <input type="password" class="form-control" id="cp-new">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Confirm New Password</label>
                        <input type="password" class="form-control" id="cp-confirm">
                    </div>
                </div>
                <div class="modal-footer border-secondary">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-warning" onclick="changePassword()">Change Password</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
