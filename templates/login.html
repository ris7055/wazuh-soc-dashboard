<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ai-SOC.MSP Dashboard - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0a1628 0%, #1a2332 50%, #0d1926 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .login-card {
            background: rgba(22, 27, 34, 0.95);
            border: 1px solid rgba(48, 54, 61, 0.8);
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .brand-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #f7931a, #ff6b35);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 32px;
            color: white;
        }
        .login-title {
            color: #e6edf3;
            font-weight: 600;
            text-align: center;
            margin-bottom: 0.25rem;
        }
        .login-subtitle {
            color: #7d8590;
            text-align: center;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        .form-control {
            background: #0d1117;
            border: 1px solid #30363d;
            color: #e6edf3;
            padding: 0.75rem 1rem;
        }
        .form-control:focus {
            background: #0d1117;
            border-color: #f7931a;
            color: #e6edf3;
            box-shadow: 0 0 0 3px rgba(247,147,26,0.15);
        }
        .form-label { color: #7d8590; font-weight: 500; }
        .btn-login {
            background: linear-gradient(135deg, #f7931a, #ff6b35);
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.75rem;
            width: 100%;
            border-radius: 8px;
            font-size: 1rem;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #e8851a, #e85d2f);
            color: white;
        }
        .version-text {
            color: #484f58;
            text-align: center;
            font-size: 0.75rem;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand-icon">
            <i class="bi bi-shield-lock"></i>
        </div>
        <h4 class="login-title">Ai-SOC.MSP Dashboard</h4>
        <p class="login-subtitle">FortiSIEM-style Security Operations Center</p>

        {% if error %}
        <div class="alert alert-danger py-2 text-center" role="alert">
            <i class="bi bi-exclamation-triangle me-1"></i>{{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" name="username" placeholder="Enter username"
                       autofocus required>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" name="password" placeholder="Enter password"
                       required>
            </div>
            <button type="submit" class="btn btn-login">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
        </form>
        <p class="version-text">V2.0 &mdash; Powered by Wazuh</p>
    </div>
</body>
</html>
